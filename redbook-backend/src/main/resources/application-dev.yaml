aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${ALIYUN_OSS_BUCKET:}
    url-prefix: ${ALIYUN_OSS_URL_PREFIX:}
    # 默认 false：新版 Bucket 常「禁用 ACL」，为 true 时预签名带 x-oss-object-acl 易导致 PUT 403（前端仅提示「上传失败」）
    object-public-read: ${ALIYUN_OSS_OBJECT_PUBLIC_READ:false}